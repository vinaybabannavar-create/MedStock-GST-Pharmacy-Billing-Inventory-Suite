version: '3.8'

services:
  db:
    image: postgres:16-alpine
    container_name: mediledger_db
    restart: always
    environment:
      POSTGRES_DB: mediledger
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: mediledgerpass
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d mediledger"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: mediledger_backend
    restart: always
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/app
    env_file:
      - ./backend/.env
    depends_on:
      db:
        condition: service_healthy

  frontend:
    image: node:20-alpine
    container_name: mediledger_frontend
    restart: always
    working_dir: /app
    volumes:
      - ./frontend:/app
      - /app/node_modules
    ports:
      - "5173:5173"
    environment:
      - VITE_API_BASE_URL=http://localhost:8000
    command: npm run dev -- --host
    depends_on:
      - backend

volumes:
  pgdata:
