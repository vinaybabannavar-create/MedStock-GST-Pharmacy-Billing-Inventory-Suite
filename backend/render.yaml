services:
  # ── FastAPI Web Service ───────────────────────────────────────────────────
  - type: web
    name: mediledger-api
    runtime: python
    region: singapore  # Closest to Karnataka, India
    plan: free
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: mediledger-db
          property: connectionString
      - key: SECRET_KEY
        generateValue: true   # Render auto-generates a secure random value
      - key: ALGORITHM
        value: HS256
      - key: ACCESS_TOKEN_EXPIRE_MINUTES
        value: "480"
      - key: STORE_STATE_CODE
        value: "29"
      - key: ALLOWED_ORIGINS
        value: https://mediledger.vercel.app  # ← Update this after Vercel deploy

  # ── PostgreSQL Database ───────────────────────────────────────────────────
databases:
  - name: mediledger-db
    databaseName: mediledger
    user: mediledger_user
    region: singapore
    plan: free
